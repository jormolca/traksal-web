<!DOCTYPE html>
<html>
<body>
<canvas id="canvas"></canvas>
<script>
const img = new Image();
img.onload = function() {
    const canvas = document.getElementById('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    
    // 1. Draw rounded rectangle path for the mask
    const radius = Math.floor(img.width * 0.15); // Standard rounding
    ctx.beginPath();
    ctx.moveTo(radius, 0);
    ctx.lineTo(img.width - radius, 0);
    ctx.quadraticCurveTo(img.width, 0, img.width, radius);
    ctx.lineTo(img.width, img.height - radius);
    ctx.quadraticCurveTo(img.width, img.height, img.width - radius, img.height);
    ctx.lineTo(radius, img.height);
    ctx.quadraticCurveTo(0, img.height, 0, img.height - radius);
    ctx.lineTo(0, radius);
    ctx.quadraticCurveTo(0, 0, radius, 0);
    ctx.closePath();
    
    // 2. Clip and draw ORIGINAL image
    ctx.clip();
    ctx.drawImage(img, 0, 0);
    
    // 3. Output as data URL
    const dataUrl = canvas.toDataURL('image/png');
    const out = document.createElement('div');
    out.id = 'result';
    out.innerText = dataUrl;
    document.body.appendChild(out);
};
img.src = 'icon.png';
</script>
</body>
</html>
